<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="nav.title">투자 비서</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { background-color: #0f172a; }

    /* ── Markdown ── */
    .md-content h1 { font-size: 1.5rem; font-weight: 700; margin: 1.25rem 0 0.5rem; color: #f1f5f9; }
    .md-content h2 { font-size: 1.2rem; font-weight: 700; margin: 1rem 0 0.4rem; color: #e2e8f0; border-bottom: 1px solid #334155; padding-bottom: 0.3rem; }
    .md-content h3 { font-size: 1.05rem; font-weight: 600; margin: 0.75rem 0 0.3rem; color: #cbd5e1; }
    .md-content p  { margin: 0.5rem 0; line-height: 1.75; }
    .md-content ul { list-style: disc; padding-left: 1.5rem; margin: 0.5rem 0; }
    .md-content ol { list-style: decimal; padding-left: 1.5rem; margin: 0.5rem 0; }
    .md-content li { margin: 0.2rem 0; line-height: 1.65; }
    .md-content strong { font-weight: 700; color: #f1f5f9; }
    .md-content em { font-style: italic; color: #94a3b8; }
    .md-content code { background: #334155; padding: 0.1rem 0.35rem; border-radius: 3px; font-size: 0.85rem; font-family: monospace; }
    .md-content pre  { background: #0f2340; padding: 1rem; border-radius: 6px; overflow-x: auto; margin: 0.75rem 0; }
    .md-content pre code { background: transparent; padding: 0; }
    .md-content blockquote { border-left: 3px solid #f59e0b; padding-left: 1rem; margin: 0.75rem 0; color: #94a3b8; font-style: italic; }
    .md-content hr { border-color: #334155; margin: 1rem 0; }
    .md-content table { border-collapse: collapse; width: 100%; margin: 0.75rem 0; }
    .md-content th { background: #1e3a5f; border: 1px solid #334155; padding: 0.5rem 0.75rem; text-align: left; font-weight: 600; color: #f59e0b; }
    .md-content td { border: 1px solid #334155; padding: 0.5rem 0.75rem; }
    .md-content tr:nth-child(even) td { background: #162032; }
    .md-content a { color: #60a5fa; text-decoration: underline; }
    .up-text   { color: #22c55e !important; font-weight: 600; }
    .down-text { color: #ef4444 !important; font-weight: 600; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.25); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.6s linear infinite;
    }
    .spinner-sm {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid rgba(251,191,36,0.3); border-top-color: #fbbf24;
      border-radius: 50%; animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      padding: 0.7rem 1.2rem; border-radius: 0.5rem;
      font-size: 0.875rem; z-index: 300;
      animation: fadeUp 0.25s ease; max-width: 320px;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; animation: fadeIn 0.15s ease;
    }
    .modal-overlay.hidden { display: none; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal-box {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      padding: 1.5rem; width: 100%; max-width: 540px;
      max-height: 90vh; overflow-y: auto;
      margin: 0 1rem;
      animation: slideUp 0.2s ease;
    }
    @media (max-width: 639px) {
      .modal-box { padding: 1rem; }
    }
    @keyframes slideUp {
      from { transform: translateY(14px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* ── Form fields ── */
    .form-label { display: block; font-size: 0.72rem; color: #94a3b8; margin-bottom: 0.25rem; font-weight: 500; }
    .form-input {
      width: 100%; background: #0f172a; border: 1px solid #334155;
      color: #e2e8f0; border-radius: 6px; padding: 0.4rem 0.65rem;
      font-size: 0.875rem; outline: none; transition: border-color 0.15s;
    }
    .form-input:focus { border-color: #f59e0b; }
    .form-input option { background: #1e293b; }
    textarea.form-input { resize: vertical; min-height: 60px; }
    .form-input:read-only { opacity: 0.55; cursor: not-allowed; }
    @media (max-width: 639px) {
      .form-input { font-size: 1rem; }
      .form-label { font-size: 0.8rem; }
    }

    /* ── Language selector ── */
    #lang-selector {
      background: #0f172a; border: 1px solid #475569; color: #94a3b8;
      font-size: 0.875rem; border-radius: 4px; padding: 0.375rem 0.5rem;
      min-height: 36px; cursor: pointer; outline: none;
    }
    #lang-selector:hover { border-color: #f59e0b; color: #e2e8f0; }
    #lang-selector option { background: #1e293b; }
  </style>
</head>

<script>
// ════════════════════════════════════════════════════════════
// i18n
// ════════════════════════════════════════════════════════════
window.TRANSLATIONS = window.TRANSLATIONS || {};

function getLang() {
  return localStorage.getItem('lang') || 'ko';
}

function t(key, vars = {}) {
  const lang = getLang();
  const dict = window.TRANSLATIONS[lang] || window.TRANSLATIONS['ko'] || {};
  let str = (key in dict) ? dict[key] : ((window.TRANSLATIONS['ko'] || {})[key] ?? key);
  for (const [k, v] of Object.entries(vars)) {
    str = str.replace(`{${k}}`, v);
  }
  return str;
}

function applyTranslations() {
  const lang = getLang();
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.getAttribute('data-i18n'));
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
  });
}

function setLang(lang) {
  localStorage.setItem('lang', lang);
  document.getElementById('lang-selector').value = lang;
  applyTranslations();
  // Re-render currently visible tab to update dynamic text
  if (S.tab === 'dashboard') {
    if (S.dashView === 'viewer') renderViewerShell();
    else renderDashboardList();
  } else if (S.tab === 'portfolio') {
    renderPortfolio();
  } else if (S.tab === 'watchlist') {
    renderWatchlist();
  }
}

// ════════════════════════════════════════════════════════════
// State
// ════════════════════════════════════════════════════════════
const S = {
  tab: 'dashboard',
  dashView: 'list',
  viewerType: 'daily',
  viewerSelected: null,
  dailyReports: [],
  weeklyReports: [],
  portfolioData: [],
  watchlistData: [],
  status: null,
};

// Row lookup maps for modal (avoids serialization issues in onclick)
let _pfMap = {};
let _wlMap = {};

// ════════════════════════════════════════════════════════════
// Utilities
// ════════════════════════════════════════════════════════════

function parseApiError(err, status) {
  const d = err?.detail;
  if (!d) return t('err.server', { status });
  if (typeof d === 'string') return d;
  if (Array.isArray(d)) {
    return d.map(e => {
      const field = Array.isArray(e.loc) ? e.loc.filter(x => x !== 'body').join('.') : '';
      return field ? `${field}: ${e.msg}` : e.msg;
    }).join(' / ');
  }
  if (typeof d === 'object') return d.msg ?? JSON.stringify(d);
  return String(d);
}

async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: body ? { 'Content-Type': 'application/json' } : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(parseApiError(err, res.status));
  }
  if (res.status === 204) return null;
  return res.json();
}

function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function setModalBtns(formId, disabled) {
  document.getElementById(formId)
    ?.querySelectorAll('button')
    .forEach(btn => {
      btn.disabled = disabled;
      btn.classList.toggle('opacity-40', disabled);
      btn.classList.toggle('cursor-not-allowed', disabled);
    });
}

async function autoFillPortfolio() {
  const form   = document.getElementById('form-portfolio');
  const ticker = (document.getElementById('pf-ticker').value || '').trim().toUpperCase();
  if (!ticker) return;

  setModalBtns('form-portfolio', true);

  try {
    const data = await api('GET', `/api/enrich/${encodeURIComponent(ticker)}`);

    const fill = (name, val) => {
      const el = form.elements[name];
      if (el && !el.value) el.value = val ?? '';
    };

    fill('company_name',    data.company_name);
    fill('market',          data.market);
    fill('currency',        data.currency);
    fill('holding_status',  'active');

  } catch (err) {
    showToast(t('err.enrichFailed', { msg: err.message }), 'error');

    const isKrx = /^\d{5,6}$/.test(ticker);
    const fill  = (name, val) => { const el = form.elements[name]; if (el && !el.value) el.value = val; };
    fill('market',         isKrx ? 'KRX' : 'NASDAQ');
    fill('currency',       isKrx ? 'KRW' : 'USD');
    fill('holding_status', 'active');
  } finally {
    setModalBtns('form-portfolio', false);
  }
}

function validateNumericFields(data) {
  const result = { ...data };

  const intFields = { quantity: 'field.quantity', priority: 'field.priority' };
  for (const [field, labelKey] of Object.entries(intFields)) {
    if (!result[field]) continue;
    const label   = t(labelKey);
    const cleaned = String(result[field]).replace(/,/g, '').trim();
    if (!cleaned) { result[field] = ''; continue; }
    const n = Number(cleaned);
    if (isNaN(n) || !Number.isInteger(n)) {
      throw new Error(t('validate.intRequired', { label, val: result[field] }));
    }
    if (n < 0) throw new Error(t('validate.positiveRequired', { label }));
    result[field] = String(n);
  }

  const floatFields = { avg_cost: 'field.avgCost' };
  for (const [field, labelKey] of Object.entries(floatFields)) {
    if (!result[field]) continue;
    const label   = t(labelKey);
    const cleaned = String(result[field]).replace(/,/g, '').trim();
    if (!cleaned) { result[field] = ''; continue; }
    const n = Number(cleaned);
    if (isNaN(n)) {
      throw new Error(t('validate.numberRequired', { label, val: result[field] }));
    }
    if (n < 0) throw new Error(t('validate.positiveRequired', { label }));
    result[field] = String(n);
  }

  return result;
}

let _wlFillLock = false;

async function autoFillWatchlist(source) {
  const tickerEl  = document.getElementById('wl-ticker');
  const nameEl    = document.getElementById('wl-company-name');
  const statusEl  = document.getElementById('wl-ai-status');
  const statusMsg = document.getElementById('wl-ai-status-msg');

  if (tickerEl.readOnly) return;

  const query = source === 'ticker'
    ? tickerEl.value.trim()
    : nameEl.value.trim();
  if (!query || _wlFillLock) return;

  const form = document.getElementById('form-watchlist');
  const allFilled = ['watch_reason','ideal_entry','trigger_condition','invalidation','risk_notes']
    .every(n => form.elements[n]?.value.trim());
  if (allFilled) return;

  _wlFillLock = true;
  setModalBtns('form-watchlist', true);
  statusMsg.textContent = t('ai.analyzing');
  statusEl.classList.remove('hidden');

  try {
    const data = await api('GET', `/api/enrich/watchlist/${encodeURIComponent(query)}?lang=${getLang()}`);

    const fill = (name, val) => {
      const el = form.elements[name];
      if (el && !el.value.trim()) el.value = val ?? '';
    };

    fill('ticker',            data.ticker);
    fill('company_name',      data.company_name);
    fill('market',            data.market);
    fill('watch_reason',      data.watch_reason);
    fill('ideal_entry',       data.ideal_entry);
    fill('trigger_condition', data.trigger_condition);
    fill('invalidation',      data.invalidation);
    fill('risk_notes',        data.risk_notes);
    fill('priority',          data.priority);

    statusMsg.textContent = t('ai.complete');
    setTimeout(() => statusEl.classList.add('hidden'), 3000);

  } catch (err) {
    statusEl.classList.add('hidden');
    showToast(t('err.aiFailed', { msg: err.message }), 'error');
  } finally {
    setModalBtns('form-watchlist', false);
    _wlFillLock = false;
  }
}

// ════════════════════════════════════════════════════════════
// Markdown renderer with ▲ / ▼ colorization
// ════════════════════════════════════════════════════════════
function renderMarkdown(md) {
  const html = marked.parse(md);
  const div = document.createElement('div');
  div.innerHTML = html;
  colorizeTree(div);
  return div.innerHTML;
}
function colorizeTree(node) {
  if (node.nodeType === Node.TEXT_NODE) {
    const t = node.textContent;
    if (!t.includes('▲') && !t.includes('▼')) return;
    const span = document.createElement('span');
    const safe = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    span.innerHTML = safe
      .replace(/(▲[^▼\n]*)/g, '<span class="up-text">$1</span>')
      .replace(/(▼[^▲\n]*)/g, '<span class="down-text">$1</span>');
    node.parentNode.replaceChild(span, node);
  } else {
    Array.from(node.childNodes).forEach(colorizeTree);
  }
}

  S.tab = tab;
  ['dashboard', 'portfolio', 'watchlist'].forEach(t => {
    const btn  = document.getElementById(`tab-${t}`);
    const view = document.getElementById(`view-${t}`);
    const active = t === tab;
    btn.className = `tab-btn flex-1 sm:flex-none px-3 py-2 sm:py-1.5 rounded text-sm font-medium transition-colors ${
      active ? 'bg-amber-500 text-slate-900' : 'text-slate-300 hover:bg-slate-700'
    }`;
    view.classList.toggle('hidden', !active);
  });
  if (tab === 'portfolio') loadPortfolio();
  if (tab === 'watchlist')  loadWatchlist();
  if (tab === 'dashboard' && S.status) {
    if (S.dashView === 'viewer') {
      renderViewerShell();
      fetchViewerContent();
    } else {
      renderDashboardList();
    }
  }
}

async function openPortfolioModal(row = null) {
  _pfEditTicker = row ? row.ticker : null;
  document.getElementById('modal-portfolio-title').textContent = row ? t('modal.editStock') : t('modal.addStock');
  const form = document.getElementById('form-portfolio');
  form.reset();
  const tickerInput   = document.getElementById('pf-ticker');
  const wlSourceRow   = document.getElementById('pf-wl-source-row');
  const wlSelect      = document.getElementById('pf-wl-select');

  if (row) {
    wlSourceRow.classList.add('hidden');
    setModalBtns('form-portfolio', true);
    Object.entries(row).forEach(([k, v]) => {
      const el = form.elements[k];
      if (el) el.value = v ?? '';
    });
    tickerInput.readOnly = true;
    setModalBtns('form-portfolio', false);
  } else {
    tickerInput.readOnly = false;

    if (!S.watchlistData || S.watchlistData.length === 0) {
      try { S.watchlistData = await api('GET', '/api/watchlist'); } catch (_) { S.watchlistData = []; }
    }

    const pfTickers = new Set((S.portfolioData || []).map(r => r.ticker.toUpperCase()));
    const available = S.watchlistData.filter(r => !pfTickers.has(r.ticker.toUpperCase()));

    wlSelect.innerHTML = `<option value="">${t('placeholder.watchlistSelect')}</option>`;
    available.forEach(r => {
      const opt = document.createElement('option');
      opt.value = r.ticker;
      opt.textContent = `${r.ticker}${r.company_name ? '  ' + r.company_name : ''}`;
      wlSelect.appendChild(opt);
    });

    wlSourceRow.classList.toggle('hidden', available.length === 0);
  }

  openModal('modal-portfolio');
}

async function savePortfolioForm(e) {
  e.preventDefault();
  const form = document.getElementById('form-portfolio');
  let data = Object.fromEntries(new FormData(form));
  try {
    data = validateNumericFields(data);
    if (_pfEditTicker) {
      await api('PUT', `/api/portfolio/${_pfEditTicker}`, data);
      showToast(t('toast.stockUpdated'), 'success');
    } else {
      await api('POST', '/api/portfolio', data);
      showToast(t('toast.stockAdded'), 'success');
    }
    closeModal('modal-portfolio');
    await loadPortfolio();
  } catch (err) {
    showToast(err.message, 'error');
  }
}

  data.forEach(r => { _wlMap[r.ticker] = r; });

  el.innerHTML = `
    <div class="flex justify-between items-center mb-5">
      <h2 class="text-lg font-semibold text-amber-400">${t('watchlist.title')}</h2>
      <button onclick="openWatchlistModal()"
        class="flex items-center gap-1.5 bg-amber-500 hover:bg-amber-400 text-slate-900 font-semibold px-4 py-2 rounded-lg text-sm transition-colors">
        ${t('btn.addStock')}
      </button>
    </div>
    ${data.length === 0
      ? `<div class="text-center py-20 text-slate-400 text-sm">${t('watchlist.empty')}</div>`
      : `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          ${data.map(r => `
            <div class="bg-[#1e293b] border border-slate-700 rounded-xl p-4 hover:border-slate-600 transition-colors">
              <!-- Card header -->
              <div class="flex justify-between items-start mb-3">
                <div>
                  <div class="flex items-center gap-2">
                    <span class="font-mono font-bold text-amber-300 text-base">${esc(r.ticker)}</span>
                    ${r.market ? `<span class="text-xs text-slate-400 bg-slate-700 px-1.5 py-0.5 rounded">${esc(r.market)}</span>` : ''}
                    ${r.priority ? `<span class="text-xs text-amber-500 font-semibold">P${esc(r.priority)}</span>` : ''}
                  </div>
                  <p class="text-slate-300 text-sm mt-0.5">${esc(r.company_name)}</p>
                </div>
                <div class="flex gap-1 shrink-0 ml-2">
                  <button onclick="openWatchlistModal(_wlMap['${esc(r.ticker)}'])"
                    class="text-slate-400 hover:text-amber-400 text-sm px-3 py-2 rounded hover:bg-slate-700 transition-colors">${t('btn.edit')}</button>
                  <button onclick="confirmDeleteWatchlist('${esc(r.ticker)}')"
                    class="text-slate-400 hover:text-red-400 text-sm px-3 py-2 rounded hover:bg-slate-700 transition-colors">${t('btn.delete')}</button>
                </div>
              </div>
              <!-- Card body -->
              <div class="space-y-2 text-xs border-t border-slate-700 pt-3">
                ${r.watch_reason ? `
                  <div>
                    <span class="text-slate-500 font-medium">${t('card.watchReason')}</span>
                    <p class="text-slate-300 mt-0.5 leading-relaxed">${esc(r.watch_reason)}</p>
                  </div>` : ''}
                ${r.ideal_entry ? `
                  <div class="flex gap-3">
                    <span class="text-slate-500 font-medium shrink-0">${t('card.idealEntry')}</span>
                    <span class="text-emerald-400 font-semibold">${esc(r.ideal_entry)}</span>
                  </div>` : ''}
                ${r.trigger_condition ? `
                  <div>
                    <span class="text-slate-500 font-medium">${t('card.trigger')}</span>
                    <p class="text-slate-300 mt-0.5 leading-relaxed">${esc(r.trigger_condition)}</p>
                  </div>` : ''}
                ${r.invalidation ? `
                  <div>
                    <span class="text-slate-500 font-medium">${t('card.invalidation')}</span>
                    <p class="text-red-400/80 mt-0.5 leading-relaxed">${esc(r.invalidation)}</p>
                  </div>` : ''}
              </div>
            </div>`).join('')}
        </div>`}`;
}

let _wlEditTicker = null;

function openWatchlistModal(row = null) {
  _wlEditTicker = row ? row.ticker : null;
  _wlFillLock   = false;
  document.getElementById('wl-ai-status').classList.add('hidden');
  document.getElementById('modal-watchlist-title').textContent = row ? t('modal.editStock') : t('modal.addStock');
  const form = document.getElementById('form-watchlist');
  form.reset();
  const tickerInput = document.getElementById('wl-ticker');

  if (row) {
    setModalBtns('form-watchlist', true);
    Object.entries(row).forEach(([k, v]) => {
      const el = form.elements[k];
      if (el && !el.value) el.value = v ?? '';
    });
    tickerInput.readOnly = true;
    setModalBtns('form-watchlist', false);
  } else {
    tickerInput.readOnly = false;
  }
  openModal('modal-watchlist');
}

async function saveWatchlistForm(e) {
  e.preventDefault();
  const form = document.getElementById('form-watchlist');
  const data = Object.fromEntries(new FormData(form));
  try {
    if (_wlEditTicker) {
      await api('PUT', `/api/watchlist/${_wlEditTicker}`, data);
      showToast(t('toast.stockUpdated'), 'success');
    } else {
      await api('POST', '/api/watchlist', data);
      showToast(t('toast.stockAdded'), 'success');
    }
    closeModal('modal-watchlist');
    await loadWatchlist();
  } catch (err) {
    showToast(err.message, 'error');
  }
}

function confirmDeleteWatchlist(ticker) {
  openConfirm(t('confirm.deleteWatchlist', { ticker }), async () => {
    try {
      await api('DELETE', `/api/watchlist/${ticker}`);
      showToast(t('toast.stockDeleted'), 'success');
      await loadWatchlist();
    } catch (err) {
      showToast(err.message, 'error');
    }
  });
}

// ════════════════════════════════════════════════════════════
// Init
// ════════════════════════════════════════════════════════════
async function init() {
  const savedLang = getLang();
  document.getElementById('lang-selector').value = savedLang;
  applyTranslations();

  switchTab('dashboard');
  try {
    await loadDashboard();
  } catch (e) {
    document.getElementById('view-dashboard').innerHTML =
      `<div class="bg-red-900/30 border border-red-700 rounded-xl p-5 text-sm text-red-300">
        ${t('err.serverConnect', { msg: e.message })}<br>
        <span class="text-slate-400 text-xs mt-1 block">${t('err.serverCheck')}</span>
      </div>`;
  }
}

window.addEventListener('DOMContentLoaded', init);
</script>
